version: "3.9"

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.phase2
    image: crop-disease-advisor:phase2
    container_name: crop_advisor_api_p2
    command: uvicorn src.api.main_phase2:app --host 0.0.0.0 --port 8000
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ../models:/app/models               # hot-swap both vision + LLM models
      - ../data/processed:/app/data/processed
    environment:
      - PHASE=2
      - DEVICE=cuda
      - LOG_LEVEL=info
      - MODEL_PATH=models/vision/efficientnet_b4_best.pt
      - ADAPTER_PATH=models/llm/llama3_qlora_adapter
      - BASE_LLM=meta-llama/Meta-Llama-3-8B-Instruct
      - WANDB_API_KEY=${WANDB_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # extra time for LLM load

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.phase2
    image: crop-disease-advisor:phase2
    container_name: crop_advisor_ui_p2
    command: python3 src/ui/gradio_phase2.py
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
    ports:
      - "7860:7860"
    restart: unless-stopped
