base_model: Qwen/Qwen2.5-3B-Instruct
adapter_path: models/llm/qwen2.5_3b_qlora_adapter

# Quantization (BitsAndBytes)
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: float16
bnb_4bit_use_double_quant: true

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_bias: none
lora_task_type: CAUSAL_LM

# Training
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 100
lr_scheduler_type: cosine
fp16: false
bf16: true
logging_steps: 10
save_steps: 500
output_dir: models/llm/qwen2.5_3b_qlora
seed: 42

# Dataset
instruction_dataset: data/processed/llm_instructions.jsonl
train_split: 0.9

# Generation
max_new_tokens: 512
temperature: 0.7
top_p: 0.9
do_sample: true
retry_temperature: 0.3
max_retries: 2

# WandB
wandb_project: crop-disease-advisor-llm
