name: Deploy to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "configs/**"
      - "app.py"
      - "requirements_phase2.txt"
  workflow_dispatch:   # allow manual trigger

jobs:
  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test deps
        run: |
          pip install torch==2.1.0+cpu torchvision==0.16.0+cpu \
              --index-url https://download.pytorch.org/whl/cpu
          pip install timm pillow scikit-learn numpy pytest \
              fastapi uvicorn python-multipart httpx pyyaml \
              opencv-python-headless albumentations reportlab

      - name: Create dummy fixtures
        run: |
          mkdir -p data/processed
          python -c "
          import json
          names = {str(i): f'Crop_{i}___Disease_{i}' for i in range(38)}
          with open('data/processed/class_names.json','w') as f:
              json.dump(names, f)
          "

      - name: Run pre-deploy tests
        run: |
          pytest tests/test_preprocessing.py \
                 tests/test_vision_model.py \
                 tests/test_pipeline.py \
                 -v --tb=short

  deploy:
    name: Push to HuggingFace Space
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install huggingface-hub
        run: pip install huggingface-hub

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          api      = HfApi()
          username = os.environ["HF_USERNAME"]
          token    = os.environ["HF_TOKEN"]
          repo_id  = f"{username}/crop-disease-advisor"

          # Create space if not exists
          try:
              api.create_repo(repo_id=repo_id, repo_type="space",
                              space_sdk="gradio", exist_ok=True, token=token)
          except Exception as e:
              print(f"Repo already exists or error: {e}")

          # Upload app files
          upload_files = ["app.py", "src/", "configs/",
                          "requirements_phase2.txt", "README_space.md"]
          for path in upload_files:
              import pathlib
              p = pathlib.Path(path)
              if p.exists():
                  if p.is_dir():
                      api.upload_folder(folder_path=str(p),
                                        path_in_repo=str(p),
                                        repo_id=repo_id, repo_type="space",
                                        token=token)
                  else:
                      api.upload_file(path_or_fileobj=str(p),
                                      path_in_repo=p.name,
                                      repo_id=repo_id, repo_type="space",
                                      token=token)
          print(f"✓ Deployed to https://huggingface.co/spaces/{repo_id}")
          EOF

      - name: Notify via WandB alert
        if: always()
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          STATUS="${{ job.status }}"
          python - <<EOF
          import wandb, os
          wandb.init(project="crop-disease-advisor", job_type="deployment")
          wandb.alert(
              title=f"HF Space Deployment: {os.environ.get('STATUS','unknown').upper()}",
              text=f"Commit: ${{ github.sha[:8] }} | Branch: ${{ github.ref_name }}",
              level=wandb.AlertLevel.INFO if "$STATUS" == "success" else wandb.AlertLevel.ERROR,
          )
          wandb.finish()
          EOF
